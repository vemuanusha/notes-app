<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Notes App</title>

  <style>

    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.container{
  width:100%;
  max-width:750px;
  background:#ffffff;
  padding:35px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
  text-align:center;
  margin-bottom:30px;
  color:#0f172a;
  font-size:42px;
}

.form-group{
  margin-bottom:20px;
}

input,
textarea{
  width:100%;
  padding:16px;
  border:none;
  outline:none;
  border-radius:12px;
  background:#f1f5f9;
  font-size:17px;
  transition:0.3s;
}

input:focus,
textarea:focus{
  background:#e2e8f0;
  box-shadow:0 0 0 3px #93c5fd;
}

textarea{
  height:140px;
  resize:none;
}

button{
  border:none;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
  font-weight:bold;
}

.add-btn{
  width:100%;
  padding:16px;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  margin-top:10px;
}

.add-btn:hover{
  transform:translateY(-2px);
  opacity:0.95;
}

.notes{
  margin-top:35px;
}

.note{
  background:#f8fafc;
  border-left:6px solid #2563eb;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  color:#0f172a;
}

.note h3{
  color:#0f172a;
  margin-bottom:10px;
  font-size:24px;
}

.note p{
  color:#475569;
  line-height:1.6;
  font-size:16px;
  margin-top:10px;
}

.actions{
  margin-top:18px;
  display:flex;
  gap:12px;
}

.edit-btn{
  background:#16a34a;
  color:white;
  padding:10px 18px;
  border-radius:10px;
}

.edit-btn:hover{
  background:#15803d;
}

.delete-btn{
  background:#dc2626;
  color:white;
  padding:10px 18px;
  border-radius:10px;
}

.delete-btn:hover{
  background:#b91c1c;
}
.edit{
  background:#15803d;
  color: white;
  padding: 10px 18px;
  border-radius:10px;
}
.delete{
  background:#dc2626 ;
  color: white;
  padding: 10px 18px;
  border-radius:10px;
}

  </style>

</head>

<body>

  <div class="container">

    <h1>Notes App</h1>

    <div class="form-group">
      <input
        type="text"
        id="title"
        placeholder="Enter note title"
      >
    </div>

    <div class="form-group">
      <textarea
        id="description"
        placeholder="Enter note description"
      ></textarea>
    </div>

    <button class="add-btn" onclick="addNote()">
      Add Note
    </button>

    <div class="notes" id="notes"></div>
    <div class="note">
        <h3>Learn Node.js</h3>
        <p>Understand modules and HTTP server.</p>

        <div class="actions">
          <button class="edit">Edit</button>
          <button class="delete">Delete</button>
        </div>
      </div>

      <div class="note">
        <h3>Learn Express.js</h3>
        <p>Complete routing and middleware concepts.</p>

        <div class="actions">
          <button class="edit">Edit</button>
          <button class="delete">Delete</button>
        </div>
      </div>


  </div>



  <script>

    async function getNotes() {

      const response = await fetch("/notes");

      const notes = await response.json();

      const notesContainer =
        document.getElementById("notes");

      notesContainer.innerHTML = "";



      notes.forEach(note => {

        notesContainer.innerHTML += `

          <div class="note">

            <h3>${note.title}</h3>

            <p>${note.description}</p>

            <div class="actions">

              <button
                class="edit-btn"
                onclick="editNote('${note.id}')"
              >
                Edit
              </button>

              <button
                class="delete-btn"
                onclick="deleteNote('${note.id}')"
              >
                Delete
              </button>

            </div>

          </div>

        `;

      });

    }




    async function addNote() {

      const title =
        document.getElementById("title").value;

      const description =
        document.getElementById("description").value;



      await fetch("/notes", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          title,
          description
        })

      });



      document.getElementById("title").value = "";

      document.getElementById("description").value = "";



      getNotes();

    }




    async function deleteNote(id) {

      await fetch(`/notes/${id}`, {

        method: "DELETE"

      });

      getNotes();

    }




    async function editNote(id) {

      const newTitle =
        prompt("Enter new title");

      const newDescription =
        prompt("Enter new description");



      await fetch(`/notes/${id}`, {

        method: "PUT",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          title: newTitle,
          description: newDescription
        })

      });


      getNotes();

    }



    getNotes();

  </script>

</body>
</html>
